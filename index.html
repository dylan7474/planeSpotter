<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWatcher ADS-B Auto-Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        #camera-feed {
            width: 100%;
            height: auto;
            transform: scaleX(1);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border: 2px dashed rgba(255, 255, 0, 0.5);
        }
        .plane-marker {
            position: absolute;
            background: rgba(255, 0, 0, 0.6);
            color: white;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
        }
        #gallery img {
            width: 150px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #gallery img:hover {
            transform: scale(1.05);
        }
        .log-entry {
            font-family: monospace;
            font-size: 12px;
            border-bottom: 1px solid #eee;
            padding: 2px 0;
        }
        /* Custom slider styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        input[type=range]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Camera & Controls -->
        <div class="lg:col-span-2 space-y-4">
            <header class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-400">SkyWatcher <span class="text-sm font-normal text-slate-400">ADS-B Auto-Snap</span></h1>
                <div id="status-tag" class="px-3 py-1 rounded-full text-xs bg-red-900 text-red-200">Disconnected</div>
            </header>

            <!-- MOVED: Airspace Scanner now at the top -->
            <div class="bg-slate-800 p-4 rounded-xl flex flex-col items-center shadow-xl">
                <div class="w-full flex justify-between items-center border-b border-slate-700 pb-2 mb-2">
                    <h3 class="font-bold text-blue-400">Airspace Scanner</h3>
                    <div class="flex gap-2">
                        <div id="weather-status" class="px-2 py-1 rounded-full text-[10px] bg-slate-700 text-slate-400 hidden sm:block">Weather: Standby</div>
                        <div id="data-status" class="px-2 py-1 rounded-full text-[10px] bg-slate-700 text-slate-400">Data: Standby</div>
                    </div>
                </div>
                <div class="flex justify-center w-full pt-2">
                    <canvas id="radar-canvas" width="800" height="500" class="w-full h-auto bg-slate-900 rounded-xl border-2 border-slate-700 shadow-inner"></canvas>
                </div>
            </div>

            <div id="camera-preview-container" class="video-container shadow-2xl relative min-h-[300px] flex items-center justify-center hidden">
                <video id="camera-feed" autoplay playsinline></video>
                <canvas id="overlay-canvas" class="overlay"></canvas>
                <div id="capture-flash" class="absolute inset-0 bg-white opacity-0 pointer-events-none transition-opacity duration-100"></div>
                <div id="camera-error" class="absolute inset-0 bg-slate-800/90 flex flex-col items-center justify-center text-center p-6 hidden">
                    <svg class="w-12 h-12 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <h2 class="text-xl font-bold text-red-400 mb-2">Camera Access Blocked</h2>
                    <p id="camera-error-msg" class="text-sm text-slate-300">Please check your permissions.</p>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl space-y-4">
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">DUMP1090 IP:PORT</label>
                        <input id="dump-ip" type="text" value="192.168.50.100:8080" class="w-full bg-slate-700 p-2 rounded text-sm outline-none border border-slate-600 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Your Lat</label>
                        <input id="my-lat" type="number" step="0.000001" placeholder="e.g. 0.000000" class="w-full bg-slate-700 p-2 rounded text-sm outline-none border border-slate-600 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Your Lon</label>
                        <input id="my-lon" type="number" step="0.000001" placeholder="e.g. 0.000000" class="w-full bg-slate-700 p-2 rounded text-sm outline-none border border-slate-600 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Cam Azimuth (East=90)</label>
                        <input id="cam-az" type="number" value="90" class="w-full bg-slate-700 p-2 rounded text-sm">
                    </div>
                </div>

                <!-- Proximity Slider -->
                <div class="pt-2 border-t border-slate-700">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs text-slate-400">Max Capture Distance (Proximity)</label>
                        <span class="text-sm font-bold text-blue-400"><span id="dist-val">10</span> NM</span>
                    </div>
                    <input type="range" id="dist-slider" min="1" max="30" step="0.5" value="10" class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="flex flex-wrap gap-4 pt-2 border-t border-slate-700">
                    <button id="btn-start" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded font-bold transition">Start Monitoring</button>
                    <button id="btn-toggle-cam" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded font-bold transition">Test Camera</button>
                    <button id="btn-manual" class="bg-slate-600 hover:bg-slate-500 px-6 py-2 rounded font-bold transition">Manual Snap</button>
                    <div class="flex flex-col gap-1 justify-center ml-2">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="auto-snap" checked>
                            <label for="auto-snap" class="text-xs text-slate-200">Auto-Snap</label>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="snap-clear-only" checked>
                            <label for="snap-clear-only" class="text-xs text-slate-400">Clear skies only</label>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="map-overlay" checked>
                            <label for="map-overlay" class="text-xs text-slate-400">Map overlay</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Data & Logs -->
        <div class="space-y-4">
            
            <div class="bg-slate-800 p-4 rounded-xl h-[500px] flex flex-col">
                <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-2">
                    <h3 class="font-bold">Visible Planes</h3>
                    <button id="btn-toggle-list" class="px-2 py-1 bg-slate-700 hover:bg-slate-600 rounded text-[10px] text-slate-300 transition">Show: All</button>
                </div>
                <div id="plane-list" class="flex-1 overflow-y-auto space-y-2">
                    <p class="text-slate-500 text-sm italic">Waiting for data...</p>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl h-[350px] flex flex-col">
                <h3 class="font-bold border-b border-slate-700 pb-2 mb-2">Event Log</h3>
                <div id="log" class="flex-1 overflow-y-auto text-xs text-slate-300">
                    <div class="log-entry">System ready.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Gallery Section -->
    <div class="max-w-6xl mx-auto mt-6 bg-slate-800 p-6 rounded-xl">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Captured Photos</h2>
            <button id="btn-clear-gallery" class="text-xs text-red-400 hover:underline">Clear All</button>
        </div>
        <div id="gallery" class="flex flex-wrap gap-4">
            <!-- Photos appear here -->
        </div>
    </div>

    <script>
        // State
        let config = {
            ip: '192.168.50.100:8080',
            lat: 0,
            lon: 0,
            camAzimuth: 90, // Facing East
            fovH: 60,       // Estimated Horizontal FOV of webcam
            fovV: 40,       // Estimated Vertical FOV
            distLimit: 10,  // Nautical miles
            pollInterval: 1000,
            autoSnap: true,
            snapClearOnly: true,
            showRadarOnly: false,
            mapOverlay: true
        };

        const elements = {
            camContainer: document.getElementById('camera-preview-container'),
            video: document.getElementById('camera-feed'),
            planeList: document.getElementById('plane-list'),
            log: document.getElementById('log'),
            status: document.getElementById('status-tag'),
            gallery: document.getElementById('gallery'),
            flash: document.getElementById('capture-flash'),
            camError: document.getElementById('camera-error'),
            camErrorMsg: document.getElementById('camera-error-msg'),
            btnToggleCam: document.getElementById('btn-toggle-cam'),
            distSlider: document.getElementById('dist-slider'),
            distVal: document.getElementById('dist-val'),
            radar: document.getElementById('radar-canvas'),
            weatherStatus: document.getElementById('weather-status'),
            btnToggleList: document.getElementById('btn-toggle-list'),
            mapOverlay: document.getElementById('map-overlay'),
            dumpIp: document.getElementById('dump-ip'),
            myLat: document.getElementById('my-lat'),
            myLon: document.getElementById('my-lon'),
            camAz: document.getElementById('cam-az'),
            autoSnap: document.getElementById('auto-snap'),
            snapClearOnly: document.getElementById('snap-clear-only')
        };

        let activePlanes = [];
        let capturedHex = new Set(); // Prevent spamming same plane
        let stream = null;
        let currentWeatherCode = -1; // -1: Unknown, 0-2: Clear/Partly Cloudy, 3+: Cloudy/Poor
        const mapTileState = {
            cache: new Map(),
            pending: new Set()
        };
        
        // --- Initialization ---

        window.onload = async () => {
            loadSettings();
            setupCamera();
            
            document.getElementById('btn-start').onclick = toggleMonitoring;
            document.getElementById('btn-manual').onclick = () => takeSnap('MANUAL');
            document.getElementById('btn-clear-gallery').onclick = () => elements.gallery.innerHTML = '';
            elements.btnToggleCam.onclick = toggleCameraPreview;
            elements.btnToggleList.onclick = togglePlaneList;
            elements.mapOverlay.addEventListener('change', (e) => {
                config.mapOverlay = e.target.checked;
                saveSettings();
                drawRadar();
            });

            // Proximity slider listener
            elements.distSlider.addEventListener('input', (e) => {
                elements.distVal.innerText = e.target.value;
                config.distLimit = parseFloat(e.target.value); 
                saveSettings();
                drawRadar(); 
            });

            // Persist field/checkbox changes immediately
            [
                elements.dumpIp,
                elements.myLat,
                elements.myLon,
                elements.camAz
            ].forEach((field) => field.addEventListener('change', saveSettings));

            [
                elements.autoSnap,
                elements.snapClearOnly
            ].forEach((box) => box.addEventListener('change', saveSettings));

            // Initial draw of the empty radar
            drawRadar();
        };

        function toggleCameraPreview() {
            const isHidden = elements.camContainer.classList.contains('hidden');
            if (isHidden) {
                elements.camContainer.classList.remove('hidden');
                elements.btnToggleCam.innerText = 'Hide Camera';
            } else {
                elements.camContainer.classList.add('hidden');
                elements.btnToggleCam.innerText = 'Test Camera';
            }
        }

        function togglePlaneList() {
            config.showRadarOnly = !config.showRadarOnly;
            elements.btnToggleList.innerText = config.showRadarOnly ? "Show: Radar Only" : "Show: All";
            saveSettings();
            renderPlaneList();
        }

        async function setupCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                const msg = window.isSecureContext === false 
                    ? "Camera blocked. You must access this page via http://localhost or https:// to use the webcam."
                    : "Your browser does not support webcam access.";
                
                showCameraError(msg);
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: "environment" 
                    } 
                });
                elements.video.srcObject = stream;
                elements.camError.classList.add('hidden');
                addLog("Camera initialized successfully in background.");
            } catch (err) {
                let msg = "Camera error: " + err.message;
                if (err.name === "NotAllowedError") {
                    msg = "Camera permission denied by user.";
                } else if (err.name === "NotFoundError") {
                    msg = "No camera found on this device.";
                }
                showCameraError(msg);
                
                elements.camContainer.classList.remove('hidden');
                elements.btnToggleCam.innerText = 'Hide Camera';
            }
        }

        function showCameraError(msg) {
            elements.camErrorMsg.innerText = msg;
            elements.camError.classList.remove('hidden');
            addLog(msg);
            console.error(msg);
        }

        // --- Core Logic ---

        let monitorTimer = null;
        let weatherTimer = null;
        let isDataConnected = null;

        function toggleMonitoring() {
            if (monitorTimer) {
                clearInterval(monitorTimer);
                clearInterval(weatherTimer);
                monitorTimer = null;
                weatherTimer = null;
                elements.status.innerText = "Paused";
                elements.status.className = "px-3 py-1 rounded-full text-xs bg-yellow-900 text-yellow-200";
                document.getElementById('btn-start').innerText = "Start Monitoring";
                addLog("Monitoring stopped.");
            } else {
                updateConfig();
                
                // Initial fetches
                fetchWeather();
                fetchData();

                // Set intervals
                monitorTimer = setInterval(fetchData, config.pollInterval);
                weatherTimer = setInterval(fetchWeather, 900000); 

                elements.status.innerText = "Monitoring";
                elements.status.className = "px-3 py-1 rounded-full text-xs bg-green-900 text-green-200";
                document.getElementById('btn-start').innerText = "Stop Monitoring";
                addLog("Monitoring started for " + config.ip);
            }
        }

        function updateConfig() {
            const newLat = parseFloat(document.getElementById('my-lat').value) || 0;
            const newLon = parseFloat(document.getElementById('my-lon').value) || 0;
            
            config.lat = newLat;
            config.lon = newLon;

            config.ip = document.getElementById('dump-ip').value;
            config.camAzimuth = parseFloat(document.getElementById('cam-az').value) || 90;
            config.distLimit = parseFloat(elements.distSlider.value);
            config.autoSnap = document.getElementById('auto-snap').checked;
            config.snapClearOnly = document.getElementById('snap-clear-only').checked;
            config.mapOverlay = document.getElementById('map-overlay').checked;
            saveSettings();
        }

        function loadSettings() {
            // Preferred settings blob (new format)
            const savedConfigRaw = localStorage.getItem('skywatcher_settings');
            if (savedConfigRaw) {
                try {
                    const savedConfig = JSON.parse(savedConfigRaw);
                    config = { ...config, ...savedConfig };
                } catch (err) {
                    console.warn('Could not parse saved settings blob:', err);
                }
            }

            // Backward compatibility with older individual keys
            const savedLat = localStorage.getItem('skywatcher_lat');
            const savedLon = localStorage.getItem('skywatcher_lon');
            const savedIp = localStorage.getItem('skywatcher_ip');
            const savedAz = localStorage.getItem('skywatcher_az');
            const savedClear = localStorage.getItem('skywatcher_clear');
            const savedMapOverlay = localStorage.getItem('skywatcher_map_overlay');

            if (savedLat && !savedConfigRaw) config.lat = parseFloat(savedLat);
            if (savedLon && !savedConfigRaw) config.lon = parseFloat(savedLon);
            if (savedIp && !savedConfigRaw) config.ip = savedIp;
            if (savedAz && !savedConfigRaw) config.camAzimuth = parseFloat(savedAz);
            if (savedClear !== null && !savedConfigRaw) config.snapClearOnly = savedClear === 'true';
            if (savedMapOverlay !== null && !savedConfigRaw) config.mapOverlay = savedMapOverlay === 'true';

            // Apply loaded settings to UI controls
            elements.myLat.value = config.lat || '';
            elements.myLon.value = config.lon || '';
            elements.dumpIp.value = config.ip || '';
            elements.camAz.value = config.camAzimuth;
            elements.distSlider.value = config.distLimit;
            elements.distVal.innerText = String(config.distLimit);
            elements.autoSnap.checked = config.autoSnap;
            elements.snapClearOnly.checked = config.snapClearOnly;
            elements.mapOverlay.checked = config.mapOverlay;
            elements.btnToggleList.innerText = config.showRadarOnly ? "Show: Radar Only" : "Show: All";
        }

        function saveSettings() {
            config.ip = elements.dumpIp.value;
            config.lat = parseFloat(elements.myLat.value) || 0;
            config.lon = parseFloat(elements.myLon.value) || 0;
            config.camAzimuth = parseFloat(elements.camAz.value) || 90;
            config.distLimit = parseFloat(elements.distSlider.value) || 10;
            config.autoSnap = elements.autoSnap.checked;
            config.snapClearOnly = elements.snapClearOnly.checked;
            config.mapOverlay = elements.mapOverlay.checked;

            localStorage.setItem('skywatcher_settings', JSON.stringify(config));

            // Keep legacy keys so existing users are still covered if they downgrade
            localStorage.setItem('skywatcher_lat', elements.myLat.value);
            localStorage.setItem('skywatcher_lon', elements.myLon.value);
            localStorage.setItem('skywatcher_ip', elements.dumpIp.value);
            localStorage.setItem('skywatcher_az', elements.camAz.value);
            localStorage.setItem('skywatcher_clear', elements.snapClearOnly.checked);
            localStorage.setItem('skywatcher_map_overlay', config.mapOverlay);
        }

        // --- Weather Logic (Open-Meteo) ---
        async function fetchWeather() {
            if (!config.lat || !config.lon) {
                updateWeatherUI(-1);
                return;
            }
            
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&current_weather=true`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Weather fetch failed");
                const data = await response.json();
                currentWeatherCode = data.current_weather.weathercode;
                updateWeatherUI(currentWeatherCode);
            } catch (err) {
                console.error("Weather error:", err);
                updateWeatherUI(-1);
            }
        }

        function updateWeatherUI(code) {
            if (code === 0 || code === 1) {
                elements.weatherStatus.innerText = "Weather: Clear";
                elements.weatherStatus.className = "px-2 py-1 rounded-full text-[10px] bg-blue-900 text-blue-200 hidden sm:block";
            } else if (code === 2) {
                elements.weatherStatus.innerText = "Weather: Partly Cloudy";
                elements.weatherStatus.className = "px-2 py-1 rounded-full text-[10px] bg-yellow-900 text-yellow-200 hidden sm:block";
            } else if (code >= 3) {
                elements.weatherStatus.innerText = "Weather: Cloudy/Poor";
                elements.weatherStatus.className = "px-2 py-1 rounded-full text-[10px] bg-slate-700 text-slate-300 hidden sm:block";
            } else {
                elements.weatherStatus.innerText = "Weather: Unknown";
                elements.weatherStatus.className = "px-2 py-1 rounded-full text-[10px] bg-slate-800 text-slate-500 hidden sm:block";
            }
        }

        // --- Data Fetching ---
        async function fetchData() {
            const url = `http://${config.ip}/dump1090-fa/data/aircraft.json`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                updateDataStatus(true);
                processPlanes(data.aircraft);
            } catch (err) {
                updateDataStatus(false, err.message);
            }
        }

        function updateDataStatus(connected, errorMsg = "") {
            const el = document.getElementById('data-status');
            if (connected && isDataConnected !== true) {
                isDataConnected = true;
                el.innerText = "Data: Connected";
                el.className = "px-2 py-1 rounded-full text-[10px] bg-green-900 text-green-200";
                addLog("Data connection established.");
            } else if (!connected && isDataConnected !== false) {
                isDataConnected = false;
                el.innerText = "Data: Disconnected";
                el.className = "px-2 py-1 rounded-full text-[10px] bg-red-900 text-red-200";
                addLog("Data connection error: " + (errorMsg || "Failed to fetch"));
                elements.planeList.innerHTML = '<p class="text-slate-500 text-sm italic">Connection lost...</p>';
            }
        }

        function processPlanes(aircraft) {
            if (!aircraft) return;

            const now = Date.now();
            activePlanes = aircraft
                .filter(p => p.lat && p.lon && p.alt_baro)
                .map(p => {
                    const pos = calculateRelative(p.lat, p.lon, p.alt_baro);
                    return { ...p, ...pos };
                });

            renderPlaneList();
            drawRadar();
            checkAutoSnap();
        }

        function drawRadar() {
            if (!elements.radar) return;
            const canvas = elements.radar;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            // Shift center down slightly so tall altitude stalks don't clip out the top
            const cx = w / 2;
            const cy = h / 2 + 60; 
            const maxR = (w / 2) - 40; 
            const tilt = 0.45; // Isometric squash factor

            ctx.clearRect(0, 0, w, h);

            // Elite Theme Colors - Enhanced
            const gridColor = 'rgba(255, 140, 0, 0.4)';
            const gridBright = 'rgba(255, 180, 50, 0.9)';
            const fovColor = 'rgba(59, 130, 246, 0.15)';
            const fovEdge = 'rgba(59, 130, 246, 0.6)';
            const radarMaxDistNM = 30;

            // Optional map overlay (lat/lon reference grid and center marker)
            if (config.mapOverlay) {
                drawMapOverlay(ctx, cx, cy, maxR, tilt, radarMaxDistNM);
            }

            // --- 1. Draw Flat 3D Grid & Plane ---
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(1, tilt);

            // Add global glow for the grid
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255, 140, 0, 0.5)';

            // Radar Rings with varying styles
            ctx.lineWidth = 2;
            for(let i=1; i<=5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = i === 5 ? gridBright : gridColor;
                if (i === 5) {
                    ctx.setLineDash([8, 12]); // Outer dashed ring
                    ctx.lineWidth = 3;
                } else if (i === 3) {
                    ctx.setLineDash([4, 8]); // Middle dashed ring
                } else {
                    ctx.setLineDash([]); // Solid rings
                }
                ctx.arc(0, 0, maxR * (i/5), 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.setLineDash([]); // Reset dash

            // Radial Crosshairs (8 segments)
            ctx.lineWidth = 2;
            ctx.strokeStyle = gridColor;
            for(let i=0; i<8; i++) {
                const angle = (i * Math.PI) / 4;
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * (maxR * 0.15), Math.sin(angle) * (maxR * 0.15)); // Leave center open
                ctx.lineTo(Math.cos(angle) * maxR, Math.sin(angle) * maxR);
                ctx.stroke();
            }

            // Camera FOV Cone
            const fovStart = (config.camAzimuth - config.fovH/2 - 90) * Math.PI / 180;
            const fovEnd = (config.camAzimuth + config.fovH/2 - 90) * Math.PI / 180;
            
            ctx.shadowBlur = 0; // Turn off glow for FOV fill
            ctx.fillStyle = fovColor;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, maxR, fovStart, fovEnd);
            ctx.closePath();
            ctx.fill();
            
            // Highlight the configured proximity arc limit on the plane
            const distLimitPx = Math.min((config.distLimit / 30) * maxR, maxR);
            ctx.strokeStyle = fovEdge;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(59, 130, 246, 0.8)';
            ctx.beginPath();
            ctx.arc(0, 0, distLimitPx, fovStart, fovEnd);
            ctx.stroke();

            ctx.restore();

            // --- 2. Draw Player Ship (Center Chevron) ---
            ctx.shadowBlur = 20;
            ctx.shadowColor = gridBright;
            ctx.fillStyle = gridBright;
            ctx.beginPath();
            ctx.moveTo(cx, cy - 14);
            ctx.lineTo(cx + 10, cy + 10);
            ctx.lineTo(cx, cy + 4);
            ctx.lineTo(cx - 10, cy + 10);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // --- 3. Calculate & Sort Planes (Back-to-Front Depth Sorting) ---
            let renderItems = [];

            activePlanes.forEach(p => {
                if (p.distanceNM > radarMaxDistNM) return; 
                
                const r = (p.distanceNM / radarMaxDistNM) * maxR;
                const angle = (p.bearing - 90) * Math.PI / 180;
                
                // Base coordinates (intersection with 3D radar grid)
                const bx = cx + Math.cos(angle) * r;
                const by = cy + Math.sin(angle) * r * tilt; 

                // Altitude stalk (0 to 40,000 feet mapped to pixels)
                // Scaled down significantly so planes at the back edge fit on canvas
                const stalkLen = Math.min((p.alt_baro / 40000) * 130, 150); 
                
                renderItems.push({
                    plane: p,
                    bx, by,
                    px: bx,
                    py: by - stalkLen,
                    inView: isPlaneInView(p),
                    depth: by // Sort by screen Y of the grid intersection
                });
            });

            // Sort so planes further "back" on the grid are drawn first
            renderItems.sort((a, b) => a.depth - b.depth);

            // --- 4. Render Planes (Holographic Style) ---

            renderItems.forEach(item => {
                const { plane: p, bx, by, px, py, inView } = item;
                
                // Colors: Green = standard, Bright Red = Target Lock (In View)
                const baseColor = inView ? 'rgba(239, 68, 68, 0.5)' : 'rgba(34, 197, 94, 0.5)';
                const stalkColor = inView ? 'rgba(239, 68, 68, 0.8)' : 'rgba(34, 197, 94, 0.8)';
                const blipColor = inView ? '#ef4444' : '#22c55e'; 
                const labelColor = inView ? '#fca5a5' : '#86efac';

                // Base Shadow (Ellipse on the grid)
                ctx.fillStyle = baseColor;
                ctx.beginPath();
                if(ctx.ellipse) {
                    ctx.ellipse(bx, by, 10, 10 * tilt, 0, 0, Math.PI * 2);
                } else {
                    ctx.arc(bx, by, 6, 0, Math.PI*2); 
                }
                ctx.fill();

                // Holographic Segmented Stalk Line
                ctx.strokeStyle = stalkColor;
                ctx.lineWidth = inView ? 3 : 2;
                ctx.setLineDash([4, 4]); 
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(px, py);
                ctx.stroke();
                ctx.setLineDash([]);

                // Blip Glow Effect
                ctx.shadowBlur = inView ? 25 : 12;
                ctx.shadowColor = blipColor;

                // Blip (Sci-Fi Diamond Shape)
                ctx.fillStyle = blipColor;
                ctx.beginPath();
                ctx.moveTo(px, py - 6);
                ctx.lineTo(px + 6, py);
                ctx.lineTo(px, py + 6);
                ctx.lineTo(px - 6, py);
                ctx.closePath();
                ctx.fill();
                
                // Heading Tail (if track data exists)
                if (p.track !== undefined) {
                    const trackRad = (p.track - 90) * Math.PI / 180;
                    ctx.strokeStyle = blipColor;
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    // Apply isometric tilt to the heading vector
                    ctx.lineTo(px + Math.cos(trackRad)*20, py + Math.sin(trackRad)*20*tilt);
                    ctx.stroke();
                }

                // Target Lock Brackets for planes in FOV
                if (inView) {
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.9)';
                    ctx.lineWidth = 2;
                    const s = 14; // Fixed bracket size scaled up
                    
                    ctx.beginPath(); // Top-Left
                    ctx.moveTo(px-s, py-s/2); ctx.lineTo(px-s, py-s); ctx.lineTo(px-s/2, py-s); ctx.stroke();
                    ctx.beginPath(); // Top-Right
                    ctx.moveTo(px+s/2, py-s); ctx.lineTo(px+s, py-s); ctx.lineTo(px+s, py-s/2); ctx.stroke();
                    ctx.beginPath(); // Bottom-Left
                    ctx.moveTo(px-s/2, py+s); ctx.lineTo(px-s, py+s); ctx.lineTo(px-s, py+s/2); ctx.stroke();
                    ctx.beginPath(); // Bottom-Right
                    ctx.moveTo(px+s, py+s/2); ctx.lineTo(px+s, py+s); ctx.lineTo(px+s/2, py+s); ctx.stroke();
                }

                ctx.shadowBlur = 0; // Reset glow for text

                // Flight Label
                ctx.fillStyle = labelColor;
                ctx.font = "bold 13px monospace";
                ctx.fillText(p.flight ? p.flight.trim() : p.hex, px + 12, py + 5);
            });
        }

        function drawMapOverlay(ctx, cx, cy, maxR, tilt, radarMaxDistNM) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(1, tilt);

            // Clip map overlay to radar disc
            ctx.beginPath();
            ctx.arc(0, 0, maxR, 0, Math.PI * 2);
            ctx.clip();

            const mapFrame = getMapFrame(config.lat, config.lon, radarMaxDistNM);

            // Ocean-like fallback tone behind tiles
            ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
            ctx.fillRect(-maxR, -maxR, maxR * 2, maxR * 2);

            if (mapFrame.canvas) {
                ctx.globalAlpha = 0.6;
                ctx.imageSmoothingEnabled = true;
                ctx.drawImage(mapFrame.canvas, -maxR, -maxR, maxR * 2, maxR * 2);
                ctx.globalAlpha = 1;
            } else {
                // Lightweight fallback if tiles haven't loaded yet
                ctx.fillStyle = 'rgba(22, 78, 99, 0.16)';
                ctx.fillRect(-maxR, -maxR, maxR * 2, maxR * 2);
            }

            // Subtle range grid over map to preserve radar readability
            const gridLines = 6;
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.18)';
            ctx.lineWidth = 1;
            for (let i = -gridLines; i <= gridLines; i++) {
                const ratio = i / gridLines;
                const x = ratio * maxR;
                const y = ratio * maxR;
                ctx.beginPath();
                ctx.moveTo(x, -maxR);
                ctx.lineTo(x, maxR);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-maxR, y);
                ctx.lineTo(maxR, y);
                ctx.stroke();
            }

            // Cardinal markers
            ctx.fillStyle = 'rgba(186, 230, 253, 0.7)';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText('N', -6, -maxR + 20);
            ctx.fillText('S', -5, maxR - 8);
            ctx.fillText('W', -maxR + 8, 5);
            ctx.fillText('E', maxR - 18, 5);

            // Home-location map pin at exact radar center
            ctx.fillStyle = 'rgba(125, 211, 252, 0.9)';
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(125, 211, 252, 0.8)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();

            // Center coordinate label (outside tilt transform so text stays crisp)
            if (config.lat && config.lon) {
                ctx.fillStyle = 'rgba(148, 163, 184, 0.9)';
                ctx.font = '11px monospace';
                const label = `${formatCoord(config.lat, 'lat')} ${formatCoord(config.lon, 'lon')} (±${radarMaxDistNM}NM)`;
                ctx.fillText(label, cx - maxR + 8, cy + maxR * tilt + 18);
                ctx.fillStyle = 'rgba(148, 163, 184, 0.7)';
                ctx.font = '10px monospace';
                ctx.fillText('Map tiles © OpenStreetMap contributors', cx - maxR + 8, cy + maxR * tilt + 32);
            }
        }

        function getMapFrame(lat, lon, radarMaxDistNM) {
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return { canvas: null };

            const targetPx = 640;
            const safeLat = Math.max(-85.0511, Math.min(85.0511, lat));
            const latRad = safeLat * Math.PI / 180;
            const metersPerNm = 1852;
            const radarMeters = radarMaxDistNM * metersPerNm;
            const radiusPx = targetPx / 2;
            const cosLat = Math.max(0.2, Math.cos(latRad));
            const metersPerPixelTarget = radarMeters / radiusPx;
            const zoomEstimate = Math.log2((156543.03392 * cosLat) / metersPerPixelTarget);
            const zoom = Math.min(14, Math.max(6, Math.round(zoomEstimate)));
            const worldTiles = 2 ** zoom;
            const worldPx = worldTiles * 256;
            const metersPerPixelActual = (156543.03392 * cosLat) / (2 ** zoom);
            const halfSpanPx = radarMeters / metersPerPixelActual;

            const xCenterPx = ((lon + 180) / 360) * worldPx;
            const yCenterPx = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * worldPx;

            const tilesAcross = Math.ceil((halfSpanPx * 2) / 256) + 4;
            const tileCenterX = Math.floor(xCenterPx / 256);
            const tileCenterY = Math.floor(yCenterPx / 256);
            const xStartTile = tileCenterX - Math.floor(tilesAcross / 2);
            const yStartTile = tileCenterY - Math.floor(tilesAcross / 2);

            const stitchedCanvas = document.createElement('canvas');
            stitchedCanvas.width = tilesAcross * 256;
            stitchedCanvas.height = tilesAcross * 256;
            const stitchedCtx = stitchedCanvas.getContext('2d');
            stitchedCtx.fillStyle = '#0f172a';
            stitchedCtx.fillRect(0, 0, stitchedCanvas.width, stitchedCanvas.height);

            const startWorldPxX = xStartTile * 256;
            const startWorldPxY = yStartTile * 256;

            let loadedTileCount = 0;

            for (let yi = 0; yi < tilesAcross; yi++) {
                const tileY = yStartTile + yi;
                if (tileY < 0 || tileY >= worldTiles) continue;

                for (let xi = 0; xi < tilesAcross; xi++) {
                    const tileX = ((xStartTile + xi) % worldTiles + worldTiles) % worldTiles;
                    const tileKey = `${zoom}/${tileX}/${tileY}`;
                    const tileImg = getOrQueueTile(tileKey);

                    if (!tileImg || !tileImg.complete || tileImg.naturalWidth === 0) continue;

                    loadedTileCount++;
                    const rawWorldTileX = xStartTile + xi;
                    const tileWorldPxX = rawWorldTileX * 256;
                    const wrapDeltaPx = (tileX - rawWorldTileX) * 256;
                    const dx = tileWorldPxX - startWorldPxX + wrapDeltaPx;
                    const dy = yi * 256;
                    stitchedCtx.drawImage(tileImg, dx, dy, 256, 256);
                }
            }

            const canvas = document.createElement('canvas');
            canvas.width = targetPx;
            canvas.height = targetPx;
            const mapCtx = canvas.getContext('2d');
            mapCtx.fillStyle = '#0f172a';
            mapCtx.fillRect(0, 0, targetPx, targetPx);

            const centerInStitchedX = xCenterPx - startWorldPxX;
            const centerInStitchedY = yCenterPx - startWorldPxY;
            const srcX = centerInStitchedX - halfSpanPx;
            const srcY = centerInStitchedY - halfSpanPx;
            const srcSize = halfSpanPx * 2;

            if (loadedTileCount > 0 && srcSize > 0) {
                mapCtx.drawImage(stitchedCanvas, srcX, srcY, srcSize, srcSize, 0, 0, targetPx, targetPx);
            }

            return {
                canvas: loadedTileCount > 0 ? canvas : null
            };
        }

        function getOrQueueTile(tileKey) {
            if (mapTileState.cache.has(tileKey)) {
                return mapTileState.cache.get(tileKey);
            }
            if (mapTileState.pending.has(tileKey)) return null;

            mapTileState.pending.add(tileKey);
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                mapTileState.cache.set(tileKey, img);
                mapTileState.pending.delete(tileKey);
                drawRadar();
            };
            img.onerror = () => {
                mapTileState.pending.delete(tileKey);
            };
            img.src = `https://tile.openstreetmap.org/${tileKey}.png`;
            return null;
        }

        function formatCoord(value, kind) {
            const dir = kind === 'lat' ? (value >= 0 ? 'N' : 'S') : (value >= 0 ? 'E' : 'W');
            return `${Math.abs(value).toFixed(3)}°${dir}`;
        }

        function calculateRelative(pLat, pLon, pAltFeet) {
            const R = 6371; // Earth radius km
            const dLat = (pLat - config.lat) * Math.PI / 180;
            const dLon = (pLon - config.lon) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(config.lat * Math.PI / 180) * Math.cos(pLat * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distanceKm = R * c;
            const distanceNM = distanceKm * 0.539957;

            // Bearing
            const y = Math.sin(dLon) * Math.cos(pLat * Math.PI / 180);
            const x = Math.cos(config.lat * Math.PI / 180) * Math.sin(pLat * Math.PI / 180) -
                      Math.sin(config.lat * Math.PI / 180) * Math.cos(pLat * Math.PI / 180) * Math.cos(dLon);
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            bearing = (bearing + 360) % 360;

            // Elevation angle
            const altKm = pAltFeet * 0.0003048;
            const elevation = Math.atan2(altKm, distanceKm) * 180 / Math.PI;

            return { distanceNM, bearing, elevation };
        }

        function renderPlaneList() {
            elements.planeList.innerHTML = '';
            
            let planesToRender = activePlanes;
            if (config.showRadarOnly) {
                planesToRender = activePlanes.filter(p => p.distanceNM <= 30); // 30NM is radar max radius
            }
            
            // Sort by distance
            planesToRender.sort((a, b) => a.distanceNM - b.distanceNM);

            planesToRender.forEach(p => {
                const isVisible = isPlaneInView(p);
                const div = document.createElement('div');
                div.className = `p-2 rounded text-sm flex justify-between items-center ${isVisible ? 'bg-blue-900 border border-blue-500' : 'bg-slate-700'}`;
                div.innerHTML = `
                    <div>
                        <span class="font-bold">${p.flight || p.hex.toUpperCase()}</span>
                        <div class="text-[10px] text-slate-400">Alt: ${p.alt_baro}ft | Dist: ${p.distanceNM.toFixed(1)}nm</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px]">Brg: ${Math.round(p.bearing)}°</div>
                        <div class="text-[10px]">Elev: ${Math.round(p.elevation)}°</div>
                    </div>
                `;
                elements.planeList.appendChild(div);
            });

            if (planesToRender.length === 0) {
                elements.planeList.innerHTML = '<p class="text-slate-500 text-sm italic">No planes match filters...</p>';
            }
        }

        function isPlaneInView(p) {
            let azDiff = p.bearing - config.camAzimuth;
            if (azDiff > 180) azDiff -= 360;
            if (azDiff < -180) azDiff += 360;

            const inAz = Math.abs(azDiff) < (config.fovH / 2);
            const inEl = p.elevation > 5 && p.elevation < 80; 
            const closeEnough = p.distanceNM <= config.distLimit; 

            return inAz && inEl && closeEnough;
        }

        function checkAutoSnap() {
            if (!config.autoSnap || !stream) return; // Don't try snapping if no stream
            
            // Prevent snapping if "Clear skies only" is enabled and the weather is cloudy (code >= 3)
            if (config.snapClearOnly && currentWeatherCode >= 3) {
                return;
            }

            activePlanes.forEach(p => {
                if (isPlaneInView(p) && !capturedHex.has(p.hex)) {
                    takeSnap(p.flight ? p.flight.trim() : p.hex.toUpperCase(), p);
                    capturedHex.add(p.hex);
                    setTimeout(() => capturedHex.delete(p.hex), 300000);
                }
            });
        }

        function takeSnap(label, planeData = null) {
            if (!stream) {
                addLog("Cannot snap photo: Camera not active.");
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = elements.video.videoWidth || 1920;
            canvas.height = elements.video.videoHeight || 1080;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(elements.video, 0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(10, canvas.height - 60, 300, 50);
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            const timeStr = new Date().toLocaleTimeString();
            ctx.fillText(`${label} - ${timeStr}`, 20, canvas.height - 35);
            if (planeData) {
                ctx.font = "14px Arial";
                ctx.fillText(`Alt: ${planeData.alt_baro}ft | Dist: ${planeData.distanceNM.toFixed(1)}nm`, 20, canvas.height - 15);
            }

            const dataUrl = canvas.toDataURL('image/jpeg');
            saveToGallery(dataUrl, label);
            
            // Only show flash if camera preview is visible
            if (!elements.camContainer.classList.contains('hidden')) {
                elements.flash.style.opacity = "1";
                setTimeout(() => elements.flash.style.opacity = "0", 100);
            }
            
            addLog(`Captured: ${label}`);
        }

        function saveToGallery(dataUrl, label) {
            const img = document.createElement('img');
            img.src = dataUrl;
            img.title = label;
            img.onclick = () => {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `SkySnap_${label}_${Date.now()}.jpg`;
                link.click();
            };
            elements.gallery.prepend(img);
        }

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.className = "log-entry";
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            elements.log.prepend(entry);
            if (elements.log.children.length > 50) elements.log.lastChild.remove();
        }
    </script>
</body>
